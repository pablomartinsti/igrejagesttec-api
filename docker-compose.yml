version: '3'

services:
  postgres:
    container_name: postgres
    restart: always
    image: postgres:16
    environment:
      POSTGRES_USER: igrejaGestTec
      POSTGRES_PASSWORD: pa26ka29
      POSTGRES_DB: finance_db
    ports:
      - '5432:5432'
    networks:
      - local

  app:
    depends_on:
      - postgres
    container_name: igrejaGestTec-api
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/home/app
    ports:
      - '3333:3333'
    networks:
      - local

networks:
  local:
    name: local
